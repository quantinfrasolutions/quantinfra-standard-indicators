name: Publish NuGet packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Extract package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Pack SDK package
        run: |
          dotnet pack QuantInfra.StandardIndicators.csproj \
            --configuration Release \
            -p:NuspecFile=QuantInfra.StandardIndicators.nuspec \
            -p:NuspecProperties="version=$PACKAGE_VERSION" \
            -o ./artifacts/packages

      - name: NuGet trusted publishing login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate